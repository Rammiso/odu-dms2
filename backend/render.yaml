services:
  # Web Service
  - type: web
    name: dms-backend
    env: node
    plan: starter
    buildCommand: "npm install"
    startCommand: "npm start"
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
    autoDeploy: true
    
  # MongoDB Service (if using Render's managed MongoDB)
  # Uncomment if you want to use Render's MongoDB instead of external
  # - type: pserv
  #   name: dms-mongodb
